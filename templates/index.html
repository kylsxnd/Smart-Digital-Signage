<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Ads Signage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <header class="mb-8 text-center">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            AI SMART SIGNAGE
        </h1>
        <p class="text-slate-400 mt-2">Targeted Advertising System via YOLOv8</p>
    </header>

    <div class="relative group">
        <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-emerald-600 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
        <div class="relative bg-slate-800 rounded-2xl p-4 shadow-2xl">
            <img src="{{ url_for('video_feed') }}" class="rounded-xl w-[640px] h-[480px] bg-slate-700 object-cover">
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-slate-800 border border-slate-700 p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full mx-4">
            <div id="icon-container" class="mb-4 text-6xl">👤</div>
            <h2 class="text-2xl font-bold mb-2">Halo, <span id="detected-gender" class="text-emerald-400">Visitor</span>!</h2>
            <p class="text-slate-400 mb-6">Kami punya penawaran menarik buat kamu. Mau lihat?</p>
            <div class="flex gap-4">
                <button onclick="rejectAd()" class="flex-1 py-3 px-4 rounded-xl bg-slate-700 hover:bg-slate-600 transition font-semibold">Nanti Saja</button>
                <button onclick="acceptAd()" class="flex-1 py-3 px-4 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 transition font-bold">Lihat Promo</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const modal = document.getElementById('modal');
        const genderText = document.getElementById('detected-gender');
        let isWaiting = false;
        let currentGender = "";

        socket.on('detected', (data) => {
            if (!isWaiting) {
                currentGender = data.gender;
                genderText.innerText = currentGender.toUpperCase();
                modal.classList.remove('hidden');
                isWaiting = true;
            }
        });

        function acceptAd() {
            const links = {
                'male': 'https://www.rolex.com',
                'female': 'https://www.sephora.com'
            };
            window.open(links[currentGender], '_blank');
            closeModal();
        }

        function rejectAd() {
            closeModal();
        }

        function closeModal() {
            modal.classList.add('hidden');
            // Kasih delay 5 detik sebelum deteksi lagi biar ga spam
            setTimeout(() => { isWaiting = false; }, 5000);
        }
    </script>
</body>
</html>
